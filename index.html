<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Rose ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:'Cinzel',serif;
}

#start{
padding:18px 45px;
font-size:28px;
border:none;
border-radius:50px;
background:#ff4d6d;
color:white;
cursor:pointer;
box-shadow:0 0 25px rgba(255,0,90,.4);
transition:.3s;
}

#start:hover{
transform:scale(1.08);
}

#message{
display:none;
position:absolute;
width:80%;
max-width:900px;
text-align:center;
font-size:34px;
line-height:1.8;
color:#b3003c;
animation:fade 2s;
z-index:5;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.heart,.rose{
position:absolute;
font-size:30px;
animation:fall linear infinite;
pointer-events:none;
}

@keyframes fall{

0%{
transform:translateY(-100px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}

}

</style>

</head>

<body>

<button id="start">
Start ❤️
</button>

<div id="message">

To Rose,<br><br>

Happy Birthday to the love of my life.<br>

May your day be as beautiful as you are.<br><br>

With all my love,<br>

Yasser Alsheikhly ❤️

</div>

<audio id="music">
<source src="v14044g50000d9epla7og65jsseu9r90.mp3" type="audio/mpeg">
</audio>

<script>

const start=document.getElementById("start");
const music=document.getElementById("music");
const message=document.getElementById("message");

start.onclick=function(){

start.style.display="none";

message.style.display="block";

music.play();

setInterval(makeHeart,300);

setInterval(makeRose,450);

}

function makeHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=4+Math.random()*4+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

function makeRose(){

const rose=document.createElement("div");

rose.className="rose";

rose.innerHTML="🌹";

rose.style.left=Math.random()*100+"vw";

rose.style.animationDuration=5+Math.random()*4+"s";

document.body.appendChild(rose);

setTimeout(()=>{
rose.remove();
},9000);

}

</script>

</body>
</html>
